crc32fast = { workspace = true }

# Official-vector regression harness. Lives at the workspace root
# under `tests/regression.rs` so the golden corpus
# (`tests/test-vectors/`) can be carried over verbatim from the C
# DS4 project. Cargo discovers it via this explicit `[[test]]` entry
# because the workspace root has no [package] section.
[[test]]
name = "regression"
path = "../../tests/regression.rs"
harness = true

# End-to-end forward-pass test. Uses a synthetic 1-layer`r`n# 8-hidden-dim attention-only GGUF and loads it via CpuBackend.
[[test]]
name = "end_to_end"
path = "tests/end_to_end.rs"
harness = true
