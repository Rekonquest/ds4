ds4-backend-metal = { workspace = true }
ds4-backend-rocm = { workspace = true }
ds4-quant = { workspace = true }
ds4-tensor = { workspace = true }
ds4-kvstore = { workspace = true }
ds4-ssd = { workspace = true }
ds4-dist = { workspace = true }
